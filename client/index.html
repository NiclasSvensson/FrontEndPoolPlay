<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>My Node App</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="page">
            <div class="container">
                <h1>Configure</h1>
                <select id="gameSelect"></select>
                <div id="strategyWrapper">
                    <select id="strategySelect"></select>
                    <div id="dynamicFields"></div>
                </div>
                <input type="number" id="budget" placeholder="Budget" value="100">
                <input type="number" id="floor" placeholder="Minimal" value="0">
                <input type="number" id="ceil" placeholder="Maximum" value="1000000">
            </div>
            <div class="container">
                <h1>Cupon</h1>
                <div id="button-grid"></div>
                <button id="btn">Submit</button>
                <p id="output"></p>
            </div>

            <div class="container">
                <h1>Expected pay</h1>
                <canvas id="histogram"></canvas>
                <h1>Sign Distribution</h1>
                <div id="distributionTable"></div>
                <button id="save">Save</button>
            </div>
        </div>
        <script src="script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    </body>
</html>
